<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提示词管理器</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="stylesheet" href="/style.css?v=17">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <h1>Prompt Browser</h1>
    <span class="version">v4</span>
  </div>

  <div class="header-center">
      <div class="wf-selector" id="wfSelector">
        <button class="wf-trigger dropdown-trigger" id="wfTrigger" title="点击选择工作流">
          <span class="wf-name" id="wfLabel">选择工作流</span>
          <span class="wf-caret dropdown-arrow">▼</span>
        </button>
      <div class="wf-popover" id="wfPopover">
        <div class="wf-popover-header">
          <span>工作流</span>
          <div class="wf-actions">
            <button class="icon-btn" id="wfSortBtn" onclick="toggleWorkflowSort()" title="切换排序">最近</button>
            <button class="icon-btn" onclick="document.getElementById('wfPicker').click()" title="从文件加载">📁</button>
            <button class="icon-btn" id="wfRestoreBtn" onclick="restoreHiddenWorkflows()" style="display:none" title="恢复隐藏">↩</button>
          </div>
        </div>
        <div class="wf-popover-list" id="wfPopoverList"></div>
      </div>
    </div>
  </div>

  <div class="header-right">
    <div class="status" id="statusBar">
      <span class="status-dot loading" id="statusDot"></span>
      <span id="statusText">检查 ComfyUI...</span>
    </div>
    <select id="qualitySelect" class="header-select" title="画质" onchange="onQualityChange()">
      <option value="2K">2K</option>
      <option value="4K" selected>4K</option>
      <option value="6K">6K</option>
      <option value="8K">8K</option>
      <option value="12K">12K</option>
    </select>
    <button class="btn btn-icon" id="orientBtn" onclick="toggleOrientation()" title="横竖屏切换">📱</button>
    <button class="btn btn-primary" id="runBtn" onclick="onMainAction()" disabled>🚀 跑图</button>
  </div>
</header>

<!-- Tab 导航 -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="promptTab" onclick="switchTab('promptTab', this)">
    📝 提示词
  </button>
  <button class="tab-btn" data-tab="galleryTab" onclick="switchTab('galleryTab', this)">
    🖼️ 历史画廊
    <span class="tab-badge" id="galleryBadge" style="display:none">0</span>
  </button>
  <button class="tab-btn" data-tab="composerTab" onclick="switchTab('composerTab', this)">
    🔧 组合创作
  </button>
</nav>

<!-- Tab: 提示词 -->
<div class="tab-content active" id="promptTab">
  <div class="container" style="flex:1">
    <aside class="sidebar" id="sidebar">
      <div class="toolbar">
        <!-- 行1: 新建按钮 + 搜索框 -->
        <div class="toolbar-row">
          <button class="btn btn-success btn-new" onclick="openCreateModal()">
            ＋ 新建
          </button>
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索提示词、标签、备注..." oninput="debounceSearch()">
          </div>
        </div>

        <!-- 行2: 分类 + 标签 (并排) -->
        <div class="toolbar-row toolbar-row-2">
          <div class="toolbar-field">
            <label class="field-label">分类 <button class="label-icon-btn" onclick="manageCategories()" title="管理分类">⚙</button></label>
            <select id="categorySelect" onchange="onCategoryChange()">
              <option value="">全部分类</option>
            </select>
          </div>
          <div class="toolbar-field">
            <label class="field-label">标签</label>
            <div class="dropdown-wrap">
              <div class="dropdown-trigger" id="tagSelectorTrigger" onclick="toggleTagSelector()">
                <span id="tagSelectorLabel">全部</span>
                <span class="dropdown-arrow">▼</span>
              </div>
              <div class="dropdown-menu" id="tagSelectorDropdown">
                <div class="dropdown-list" id="tagSelectorList"></div>
                <div class="dropdown-actions">
                  <button class="btn btn-sm btn-ghost" onclick="manageTags()">管理</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 行3: 排序 + 统计 -->
        <div class="toolbar-row toolbar-row-3">
          <div class="toolbar-field">
            <label class="field-label">排序</label>
            <select id="sortFilter" onchange="onSortChange()">
              <option value="newest">最新创建</option>
              <option value="oldest">最早创建</option>
              <option value="name_asc">名称 A→Z</option>
              <option value="name_desc">名称 Z→A</option>
              <option value="updated">最近更新</option>
              <option value="most_used">使用最多</option>
            </select>
          </div>
          <div class="toolbar-stats">
            共 <span id="countBadge">0</span> 条
          </div>
        </div>

        <!-- 分类管理按钮 (隐藏) -->
        <button id="manageCategoriesBtn" class="btn btn-sm btn-ghost" onclick="manageCategories()" style="display:none">管理分类</button>
      </div>

      <div class="batch-panel" id="batchPanel">
        <div class="batch-panel-header">
          <span class="batch-panel-toggle" id="batchPanelToggle" onclick="toggleBatchPanel()" title="折叠/展开">▼</span>
          <span id="batchPanelTitle">批量任务</span>
          <div class="batch-panel-header-actions">
            <button class="btn btn-sm btn-danger" id="batchPanelStop" onclick="batchStop()" style="display:none">停止</button>
            <button class="btn btn-sm btn-ghost" onclick="closeOutput()" title="关闭批量面板">✕</button>
          </div>
        </div>
        <div class="batch-panel-progress">
          <div class="batch-bar-wrap"><div class="batch-bar-fill" id="batchBarFill"></div></div>
          <span class="batch-progress-text" id="batchProgressText">0/0</span>
        </div>
        <div class="batch-items" id="batchItems"></div>
      </div>

      <div class="prompt-list" id="promptList"></div>
      <div class="pagination" id="promptPagination"></div>

      <div class="selection-bar" id="selectionBar">
        <label class="sel-check">
          <input type="checkbox" id="selectAllCheck" onchange="toggleSelectAll(this.checked)">
          <span>全选</span>
        </label>
        <span class="sel-info" id="selectionInfo">已选 0 项</span>
        <button class="btn btn-sm btn-ghost" onclick="clearSelection()">清空</button>
      </div>
    </aside>

    <div class="resize-handle" id="resizeHandle"></div>

    <main class="main">
      <div class="detail" id="detailPanel">
        <div class="placeholder">← 从左侧选择一个提示词</div>
      </div>

      <div class="output-area" id="outputArea">
        <div class="output-header">
          <span id="outputTitle">生成结果</span>
          <button class="close-output" onclick="closeOutput()">×</button>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-info" id="progressInfo"></div>
        <div class="output-body" id="outputBody"></div>
      </div>
    </main>
  </div>
</div>

<!-- Tab: 历史画廊 -->
<div class="tab-content" id="galleryTab">
  <div class="gallery-container">
    <div class="gallery-toolbar">
      <span class="gallery-total">共 <span id="galleryCount">0</span> 张</span>
      <input type="text" class="gallery-search" id="gallerySearch" placeholder="搜索文件名 / 提示词名称..." oninput="onGallerySearch()">
      <select class="gallery-sort" id="gallerySort" onchange="onGallerySortChange()">
        <option value="newest">最新</option>
        <option value="oldest">最早</option>
        <option value="size_desc">体积 ↓</option>
        <option value="size_asc">体积 ↑</option>
        <option value="res_desc">分辨率 ↓</option>
        <option value="res_asc">分辨率 ↑</option>
      </select>
      <select class="gallery-filter" id="galleryFilter" onchange="onGalleryFilterChange()">
        <option value="all">全部</option>
        <option value="favorite">仅收藏</option>
      </select>
      <span style="flex:1"></span>
      <button class="btn btn-sm btn-ghost" id="galleryBatchDel" style="display:none" onclick="batchDeleteHistory()">🗑️ 删除选中</button>
      <button class="btn btn-sm btn-ghost" id="galleryBatchDl" style="display:none" onclick="batchDownloadHistory()">⬇️ 下载选中</button>
      <button class="btn btn-sm btn-ghost" onclick="clearHistory()" title="清空历史">清空</button>
      <button class="btn btn-sm btn-primary" id="compareBtn" onclick="enterCompareMode()" style="display:none">
        对比 (<span id="compareCount">0</span>)
      </button>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<!-- Tab: 组合创作 -->
<div class="tab-content" id="composerTab">
  <div class="composer-layout">

    <!-- 工具栏 -->
    <div class="composer-toolbar">
      <div class="composer-toolbar-left">
        <button class="btn btn-ghost" onclick="window.randomComposer()" title="随机从各个碎片列中选一个组合">🎲 随机组合</button>
        <button class="btn btn-ghost" onclick="window.clearComposerSelection()" title="清空当前组合">🗑 清空</button>
        <span class="composer-stats" id="composerStats">加载中...</span>
      </div>
      <div class="composer-toolbar-right">
        <button class="btn btn-success" onclick="window.composerSaveAsPrompt()" title="将当前组合保存为普通提示词（快照，可编辑）">💾 另存为提示词</button>
        <button class="btn btn-ghost" onclick="window.saveComposerTemplate()" title="将当前组合保存为引用模板（跟随源提示词更新）">📁 保存模板</button>
        <button class="btn btn-primary" id="composerRunBtn" onclick="window.composerRun()" disabled>🚀 跑图</button>
      </div>
    </div>

    <!-- 主体：五列碎片 -->
    <div class="composer-body">
      <div class="composer-columns" id="composerColumns"></div>
    </div>

    <!-- 底部：工作台 + 模板面板 -->
    <div class="composer-bottom" id="composerBottom">

      <div class="composer-bottom-toggle" id="composerBottomToggle" onclick="window.toggleComposerBottom()" title="展开/收起工作台">
        <span id="composerBottomArrow">▲</span>
      </div>

      <!-- 工作台 -->
      <div class="workbench-area" id="workbenchArea">
        <div class="workbench-title">
          <span>🧩 组装工作台</span>
          <div class="workbench-title-right">
            <span class="workbench-hint">点击左侧碎片列中的卡片选择，再次点击取消</span>
            <button class="wfa-title-copy" onclick="window.copyComposedPrompt()" title="复制完整拼接提示词">📋 复制完整</button>
          </div>
        </div>
        <div class="workbench-body" id="composerWorkbench">
          <div class="workbench-empty">
            <div class="workbench-empty-icon">🧩</div>
            <div>从上方各列点击碎片，自由组合提示词</div>
            <div class="workbench-empty-hint">每列最多选一个碎片，选中的碎片会在这里拼接</div>
          </div>
        </div>
      </div>

      <!-- 模板面板 -->
      <div class="template-sidebar" id="templateSidePanel">
        <div class="template-handle" id="templateResizeHandle"></div>
        <div class="template-header">
          <span>📁 模板收藏</span>
          <span class="template-count" id="templateCount">0</span>
        </div>
        <div class="template-list" id="templateList">
          <div class="template-empty">暂无保存的模板<br><small>组合好碎片后点击"保存模板"</small></div>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- 对比模式工具栏 -->
<div class="compare-toolbar" id="compareToolbar">
  <button id="compareSyncBtn" class="active" onclick="setCompareMode('sync')">同步切换</button>
  <button id="compareSplitBtn" onclick="setCompareMode('split')">分屏对比</button>
  <span style="color:var(--muted);font-size:11px" id="compareHint">滚轮联动缩放，拖动可单独调整位置</span>
  <button onclick="exitCompareMode()">退出对比</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal: Create / Edit -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">新建提示词</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody">
      <label>名称<input id="f_name" placeholder="方便识别的名称，如：冰品店打卡"></label>
      <label>正面提示词
        <div class="prompt-edit-wrap">
          <textarea id="f_prompt" rows="4" placeholder="提示词内容..."></textarea>
          <div id="f_fragments" class="frag-editor" style="display:none"></div>
          <div class="frag-toggle-wrap">
            <button class="btn btn-sm btn-ghost" id="f_toggleFragBtn" onclick="window.toggleFragmentEdit()" style="display:none">📝 切换分段/全文编辑</button>
          </div>
        </div>
      </label>
      <label>负面提示词<textarea id="f_neg" rows="2"></textarea></label>
      <div class="form-row">
        <label>步数<input type="number" id="f_steps" placeholder="30"></label>
        <label>CFG<input type="number" step="0.1" id="f_cfg" placeholder="4.0"></label>
      </div>
      <div class="form-row">
        <label>采样器<input id="f_sampler" placeholder="euler"></label>
        <label>种子<span class="input-with-btn"><input type="number" id="f_seed" placeholder="0"><button class="btn btn-sm btn-ghost" onclick="document.getElementById('f_seed').value=Math.floor(Math.random()*999999999999999)" title="随机种子">🎲</button></span></label>
      </div>
      <div class="form-row">
        <label>模型<input id="f_model" placeholder="模型名称"></label>
        <label>标签<input id="f_tags" placeholder="逗号分隔，如：人像,室外"></label>
      </div>
      <label>备注<input id="f_note" placeholder="可选备注"></label>
      <!-- ======== Phase 1: 添加评级字段 ======== -->
      <label>评级
        <div class="rating-input" id="f_rating">
          <span class="rating-star-input" data-rating="1" onclick="setRating(1)">★</span>
          <span class="rating-star-input" data-rating="2" onclick="setRating(2)">★</span>
          <span class="rating-star-input" data-rating="3" onclick="setRating(3)">★</span>
          <span class="rating-star-input" data-rating="4" onclick="setRating(4)">★</span>
          <span class="rating-star-input" data-rating="5" onclick="setRating(5)">★</span>
          <input type="hidden" id="f_rating_value" value="">
        </div>
      </label>
      <!-- ======== Phase 2: 添加分类和标签选择 ======== -->
      <label>分类
        <select id="f_category">
          <option value="">未分类</option>
        </select>
      </label>
      <label>标签（多选）
        <div class="modal-tags-select" id="f_tags_select"></div>
      </label>
      <!-- ============================================= -->
      <input type="hidden" id="f_id" value="">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-success" id="modalSaveBtn" onclick="savePrompt()">保存</button>
    </div>
  </div>
</div>

<!-- Modal: Variation -->
<div class="modal-overlay" id="varModalOverlay">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <h2>多种子变体生成</h2>
      <button class="close-btn" onclick="closeVarModal()">×</button>
    </div>
    <div class="modal-body">
      <label>生成数量<input type="number" id="varCount" value="4" min="1" max="50" style="width:120px"></label>
      <label>起始种子（留空=随机）<input type="number" id="varStartSeed" placeholder="留空自动随机" style="width:200px"></label>
      <div class="hint">每张图种子 = 起始种子 + 索引。留空则全部随机。</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeVarModal()">取消</button>
      <button class="btn btn-warning" id="varConfirmBtn" onclick="startVariationRun()">开始生成</button>
    </div>
  </div>
</div>

<input type="file" id="wfPicker" accept=".json" style="display:none" onchange="pickWorkflowFile(event)">

<!-- Modal: 标签管理 -->
<div class="modal-overlay" id="tagManageModal">
  <div class="modal" style="width:500px">
    <div class="modal-header">
      <h2>管理标签</h2>
      <button class="close-btn" onclick="closeTagManageModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="tag-manage-form">
        <input type="text" id="newTagName" placeholder="标签名称">
        <input type="color" id="newTagColor" value="#8b5cf6">
        <button class="btn btn-success" onclick="createTag()">添加</button>
      </div>
      <div class="tag-manage-list" id="tagManageList"></div>
    </div>
  </div>
</div>

<!-- Modal: 分类管理 -->
<div class="modal-overlay" id="categoryManageModal">
  <div class="modal" style="width:500px">
    <div class="modal-header">
      <h2>管理分类</h2>
      <button class="close-btn" onclick="closeCategoryManageModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="category-manage-form">
        <input type="text" id="newCategoryName" placeholder="分类名称">
        <input type="color" id="newCategoryColor" value="#6366f1">
        <select id="newCategoryParent"></select>
        <button class="btn btn-success" onclick="createCategory()">添加</button>
      </div>
      <div class="category-manage-list" id="categoryManageList"></div>
    </div>
  </div>
</div>

<!-- 按依赖顺序加载模块 -->
<script src="/utils.js?v=2"></script>
<script src="/ui.js?v=3"></script>
<script src="/router.js?v=2"></script>
<script src="/workflow.js?v=1"></script>
<script src="/prompt.js?v=5"></script>
<script src="/generator.js?v=1"></script>
<script src="/job.js?v=3"></script>
<script src="/history.js?v=1"></script>
<script src="/gallery.js?v=1"></script>
<script src="/imageViewer.js?v=1"></script>
<script src="/app.js?v=3"></script>
<script src="/category.js?v=2"></script>
<script src="/tag.js?v=1"></script>
<script src="/composer.js?v=8"></script>
</body>
</html>
